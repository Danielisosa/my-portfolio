 <header class="fixed top-0 left-0 w-full z-50 bg-slate-950/70 backdrop-blur-md border-b border-white/5">
      <div class="max-w-7xl mx-auto px-6 h-20 flex items-center justify-between">

        <a href="#" class="flex items-center gap-2 group">
          <span class="font-mono text-xl font-bold text-fuchsia-500 group-hover:scale-110 transition-transform">
            &lt;D /&gt;
          </span>
          <span class="font-sans tracking-wider font-extrabold text-lg text-white">
            DANIELI<span class="text-transparent bg-clip-text bg-gradient-to-r from-fuchsia-400 to-purple-400">.DEV</span>
          </span>
        </a>

        <!-- Menú de Navegación de Escritorio -->
        <nav class="hidden md:flex items-center gap-8">
          <a href="#" class="text-sm font-medium text-slate-300 hover:text-fuchsia-400 transition-colors relative after:absolute after:bottom-[-4px] after:left-0 after:w-0 after:h-[2px] after:bg-fuchsia-500 hover:after:w-full after:transition-all">
            Inicio
          </a>
          <a href="#sobre-mi" class="text-sm font-medium text-slate-300 hover:text-fuchsia-400 transition-colors relative after:absolute after:bottom-[-4px] after:left-0 after:w-0 after:h-[2px] after:bg-fuchsia-500 hover:after:w-full after:transition-all">
            Sobre Mí
          </a>
          <a href="#proyectos" class="text-sm font-medium text-slate-300 hover:text-fuchsia-400 transition-colors relative after:absolute after:bottom-[-4px] after:left-0 after:w-0 after:h-[2px] after:bg-fuchsia-500 hover:after:w-full after:transition-all">
            Proyectos
          </a>
          <a href="#contacto" class="text-sm font-medium text-slate-300 hover:text-fuchsia-400 transition-colors relative after:absolute after:bottom-[-4px] after:left-0 after:w-0 after:h-[2px] after:bg-fuchsia-500 hover:after:w-full after:transition-all">
            Contacto
          </a>
        </nav>

        <!-- Botón de Acción (CTA) unificado con la paleta de colores -->
        <div class="hidden md:flex items-center">
          <a href="#contacto" class="relative group overflow-hidden rounded-xl p-[1px] focus:outline-none">
            <span class="absolute inset-0 bg-gradient-to-r from-fuchsia-500 to-purple-600 rounded-xl"></span>
            <span class="absolute inset-0 bg-gradient-to-r from-fuchsia-500 to-purple-600 rounded-xl blur-sm opacity-50 group-hover:opacity-100 transition-opacity"></span>
            <span class="relative block px-5 py-2.5 bg-slate-950 text-white text-sm font-bold rounded-xl group-hover:bg-transparent transition-colors">
              Hablemos
            </span>
          </a>
        </div>

        <!-- Botón de Menú Móvil -->
        <button (click)="toggleMenu()" class="md:hidden text-slate-300 hover:text-fuchsia-400 focus:outline-none cursor-pointer">
          @if (!isMenuOpen()) {
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
            </svg>
          } @else {
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
            </svg>
          }
        </button>

      </div>

      <!-- Menú Móvil Desplegable utilizando el nuevo control-flow nativo -->
      @if (isMenuOpen()) {
        <div class="md:hidden bg-slate-950/95 border-b border-white/5 px-6 py-6 space-y-4">
          <a (click)="closeMenu()" href="#" class="block text-base font-medium text-slate-300 hover:text-fuchsia-400 transition-colors">
            Inicio
          </a>
          <a (click)="closeMenu()" href="#sobre-mi" class="block text-base font-medium text-slate-300 hover:text-fuchsia-400 transition-colors">
            Sobre Mí
          </a>
          <a (click)="closeMenu()" href="#proyectos" class="block text-base font-medium text-slate-300 hover:text-fuchsia-400 transition-colors">
            Proyectos
          </a>
          <a (click)="closeMenu()" href="#contacto" class="block text-base font-medium text-slate-300 hover:text-fuchsia-400 transition-colors">
            Contacto
          </a>
          <div class="pt-4 border-t border-white/5">
            <a (click)="closeMenu()" href="#contacto" class="w-full text-center block px-5 py-3 bg-gradient-to-r from-fuchsia-500 to-purple-600 hover:from-fuchsia-400 hover:to-purple-500 text-white text-sm font-bold rounded-xl shadow-lg shadow-fuchsia-500/20 transition-all">
              Hablemos
            </a>
          </div>
        </div>
      }
    </header>
    <!-- Espaciador para evitar que el contenido quede oculto debajo del header fijo -->
    <div class="h-20"></div>
